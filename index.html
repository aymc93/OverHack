<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OverCrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" type="png" href="logo final full black sans fond.png">
</head>
<body>

  <!-- Ambient background -->
  <div id="blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <div id="bubbles"></div>

  <!-- ══ SEARCH OVERLAY ══════════════════════════ -->
  <div class="search-overlay" id="searchOverlay">
    <button class="close-search" id="closeSearch">✕</button>
    <div class="search-box">
      <svg viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7"/>
        <line x1="16.5" y1="16.5" x2="22" y2="22"/>
      </svg>
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="Rechercher un jeu…"
        autocomplete="off"
        spellcheck="false"
      />
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- ══ MAIN ════════════════════════════════════ -->
  <div class="content">
    <div class="pages-wrapper">

      <button class="nav-arrow nav-left" id="navLeft" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="pages-viewport">
        <div class="pages-track" id="pagesTrack"></div>
      </div>

      <button class="nav-arrow nav-right" id="navRight">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <polyline points="9 6 15 12 9 18"/>
        </svg>
      </button>

      <div class="page-dots" id="pageDots"></div>

    </div>
  </div>

  <!-- ══ BOTTOM BAR ══════════════════════════════ -->
  <div class="bottom-bar">

    <!-- MENU button -->
    <div class="wii-btn" id="wiiBtn">MENU</div>

    <!-- Jeu du soir -->
    <a class="jds-btn" id="jdsSoir" href="#" title="Jeu du soir">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      <span id="jdsLabel">Jeu du soir</span>
      <div class="jds-pulse"></div>
    </a>

    <!-- Title + date -->
    <div class="bar-center">
      <div class="bar-title">OverCrack</div>
      <div class="bar-date" id="barDate"></div>
    </div>

    <!-- Search -->
    <button class="bar-btn" id="searchBtn" title="Rechercher">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/>
        <line x1="16.5" y1="16.5" x2="22" y2="22"/>
      </svg>
    </button>

    <!-- Theme toggle -->
    <button class="bar-btn" id="themeBtn" title="Changer le thème">
      <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1"     x2="12" y2="3"/>
        <line x1="12" y1="21"    x2="12" y2="23"/>
        <line x1="4.22" y1="4.22"   x2="5.64"  y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1"  y1="12"    x2="3"  y2="12"/>
        <line x1="21" y1="12"    x2="23" y2="12"/>
        <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"/>
        <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
      </svg>
      <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

  </div>

  <script src="script.js"></script>
</body>
</html>
